plugins {
    id 'java-library'
    id 'idea'
//    id 'maven-publish'
//    id 'signing'
}

//ext {
//    artifactName = 'Conductor Client Metrics'
//    artifactDescription = 'Conductor Client Metrics'
//}
//
//apply plugin: 'publish-config'

dependencies {
    // Exposed via PrometheusMetricsCollector#getRegistry() and
    // PrometheusApiClientMetrics(PrometheusMeterRegistry), which downstream
    // modules (e.g. harness) need to reference — use `api` so the type is
    // visible on the compile classpath of consumers.
    api 'io.micrometer:micrometer-registry-prometheus:1.15.1'
    implementation project(":conductor-client")
    // OkHttp is part of this module's public API because ApiClientMetricsInterceptor
    // implements okhttp3.Interceptor. conductor-client pulls okhttp in as
    // 'implementation', so it isn't exposed transitively — declare it directly here.
    api "com.squareup.okhttp3:okhttp:${versions.okHttp}"

    testImplementation 'org.mockito:mockito-core:5.4.0'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.13.1'
}

java {
    withSourcesJar()
    withJavadocJar()
}

test {
    useJUnitPlatform()
}