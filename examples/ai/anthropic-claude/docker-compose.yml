services:
  conductor:
    image: orkesio/orkes-conductor-standalone:latest
    ports:
      - "${CONDUCTOR_PORT:-8080}:8080"
      - "${CONDUCTOR_UI_PORT:-1234}:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    environment:
      - conductor.app.ownerEmailMandatory=false

  anthropic-claude:
    build: .
    depends_on:
      conductor:
        condition: service_healthy
    environment:
      - CONDUCTOR_BASE_URL=http://conductor:8080/api
      - CONDUCTOR_ANTHROPIC_API_KEY=${CONDUCTOR_ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
