name: Harness Worker Image

on:
  push:
    branches: [main, TOOL-33-test-worker]
    paths:
      - "harness/**"
      - "build.gradle"
      - "settings.gradle"
      - ".github/workflows/harness-image.yml"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/conductor-oss/java-sdk/harness-worker
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}

      # TODO: restore real build once GHCR permissions are sorted out
      # - name: Build and push
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: ./harness/Dockerfile
      #     platforms: linux/amd64,linux/arm64
      #     push: true
      #     tags: ${{ steps.meta.outputs.tags }}

      - name: Create stub Dockerfile
        run: |
          echo 'FROM alpine:3.20' > Dockerfile.stub
          echo 'LABEL org.opencontainers.image.source=https://github.com/conductor-oss/java-sdk' >> Dockerfile.stub

      - name: Build and push (stub for permissions testing)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.stub
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
